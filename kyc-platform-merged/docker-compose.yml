version: '3.9'

services:
  # ── Mandi price sidecar ─────────────────────────────────────────
  mandi:
    build:
      context: ./mandi-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATAGOV_API_KEY: ${DATAGOV_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      FETCH_LIMIT: ${FETCH_LIMIT:-500}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-90}
    volumes:
      # Persist snapshots across container restarts
      - mandi-data:/app/data/snapshots
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js web app ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: ${MONGODB_URI:-}
      MANDI_SERVICE_URL: http://mandi:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Know Your Commodity}
    depends_on:
      mandi:
        condition: service_healthy

volumes:
  mandi-data:
